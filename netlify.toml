[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/home/news-media"
  to = "/news"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/about"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://assets.mailerlite.com; style-src 'self' 'unsafe-inline' https://assets.mailerlite.com; img-src 'self' https: data:; font-src 'self' https://assets.mailerlite.com; frame-src 'self' https://www.youtube.com https://youtube.com; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com https://assets.mailerlite.com https://static.mailerlite.com https://ml-eu.mailerlite.com https://app.mailerlite.com https://ingesteer.services-prod.nsvcs.net; base-uri 'self'; form-action 'self' https://assets.mailerlite.com https://app.mailerlite.com"
